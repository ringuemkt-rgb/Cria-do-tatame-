name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download Godot 4.2.2 headless
        run: |
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_linux.x86_64.zip
          unzip -q Godot_v4.2.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.2.2-stable_linux.x86_64

      - name: Download Godot Android export templates
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates/4.2.2.stable"
          wget -q https://github.com/godotengine/godot/releases/download/4.2.2-stable/Godot_v4.2.2-stable_export_templates.tpz
          unzip -q Godot_v4.2.2-stable_export_templates.tpz -d /tmp/godot_templates
          cp -r /tmp/godot_templates/templates/* "$HOME/.local/share/godot/export_templates/4.2.2.stable/"

      - name: Prepare Android keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_B64" ]; then
            echo "Missing ANDROID_KEYSTORE_B64 secret."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android-release.keystore

      - name: Export release APK
        env:
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ ! -f project.godot ]; then
            echo "project.godot not found at repo root."
            exit 1
          fi
          ./Godot_v4.2.2-stable_linux.x86_64 --headless --path . --export-release "Android" build/app-release.apk \
            --quit-after 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app-release.apk

      - name: Attach APK to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app-release.apk
